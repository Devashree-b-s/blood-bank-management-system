{% extends "base.html" %}
{% block title %}New Request — BloodLink{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-title">New Blood Request</h1>
    <p class="page-sub">Submit a blood requirement for a patient</p>
  </div>
  <a href="/requests" class="btn btn-outline">← Back</a>
</div>

<div class="form-card">
  <form method="POST" action="/add-request">
    <div class="form-grid">
      <div class="form-group">
        <label>Patient Name *</label>
        <input type="text" name="patient_name" class="input-field" placeholder="e.g. Anjali Sharma" required/>
      </div>
      <div class="form-group">
        <label>Blood Group Required *</label>
        <select name="blood_group" class="input-field" required>
          <option value="">Select Blood Group</option>
          {% for bg in blood_groups %}
          <option value="{{ bg }}">{{ bg }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Units Needed *</label>
        <input type="number" name="units_needed" class="input-field" placeholder="e.g. 2" min="1" required/>
      </div>
      <div class="form-group">
        <label>Hospital Name</label>
        <input type="text" name="hospital" class="input-field" placeholder="e.g. Apollo Hospital"/>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" name="contact" class="input-field" placeholder="e.g. 9876543210"/>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Submit Request</button>
      <a href="/requests" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
