{% extends "base.html" %}
{% block title %}Add Donor — BloodLink{% endblock %}
{% block content %}

<div class="page-header">
  <div>
    <h1 class="page-title">Register Donor</h1>
    <p class="page-sub">Add a new blood donor to the system</p>
  </div>
  <a href="/donors" class="btn btn-outline">← Back</a>
</div>

<div class="form-card">
  <form method="POST" action="/add-donor">
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" class="input-field" placeholder="e.g. Ravi Kumar" required/>
      </div>
      <div class="form-group">
        <label>Age *</label>
        <input type="number" name="age" class="input-field" placeholder="e.g. 25" min="18" max="65" required/>
      </div>
      <div class="form-group">
        <label>Blood Group *</label>
        <select name="blood_group" class="input-field" required>
          <option value="">Select Blood Group</option>
          {% for bg in blood_groups %}
          <option value="{{ bg }}">{{ bg }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Contact Number *</label>
        <input type="text" name="contact" class="input-field" placeholder="e.g. 9876543210" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="input-field" placeholder="e.g. ravi@email.com"/>
      </div>
      <div class="form-group">
        <label>City</label>
        <input type="text" name="city" class="input-field" placeholder="e.g. Bengaluru"/>
      </div>
      <div class="form-group">
        <label>Last Donation Date</label>
        <input type="date" name="last_donation" class="input-field"/>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Register Donor</button>
      <a href="/donors" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
